<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Lab | 8BitGPU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="avatar-studio.css">
</head>
<body>
    <main class="lab-window">
        <div class="studio-toolbar" aria-hidden="true">
            <span class="toolbar-icon">✦</span>
            <span>BEING STUDIO</span>
            <span class="toolbar-dots">● ● ●</span>
        </div>

        <div class="lab-content">
            <section class="preview-panel" aria-label="Avatar preview">
                <p class="preview-label" id="previewLabel">YOUR BEING</p>
                <div class="avatar-preview">
                    <img id="extraLayer" class="avatar-layer" alt="">
                    <img id="bodyLayer" class="avatar-layer" alt="">
                    <img id="earsLayer" class="avatar-layer" alt="">
                    <img id="headLayer" class="avatar-layer" alt="">
                    <img id="eyesLayer" class="avatar-layer" alt="">
                    <img id="hairLayer" class="avatar-layer" alt="">
                    <img id="fitLayer" class="avatar-layer" alt="">
                </div>
                <p class="status-text" id="saveStatus" aria-live="polite">Ohh... whos this?? A new Being has appeared in the 8BitGPU...</p>
            </section>

            <section class="creator-panel" aria-label="Avatar creator controls">
                <div class="step-tabs" aria-label="Creator steps">
                    <button type="button" class="step-tab active" data-step-target="species">Species</button>
                    <button type="button" class="step-tab" data-step-target="skinTone">Being Palette</button>
                    <button type="button" class="step-tab" data-step-target="style">Style</button>
                </div>

                <section class="step-panel active" data-step-panel="species">
                    <h1>Select Species</h1>
                    <p class="helper-text">Pick the kind of magical Being you want to be...</p>
                    <div class="choice-grid species-grid">
                        <button type="button" data-setting-choice="species" data-value="Pixies">Pixie</button>
                        <button type="button" data-setting-choice="species" data-value="Deerbras">Deerbra</button>
                        <button type="button" data-setting-choice="species" data-value="Thixies">Thixie</button>
                    </div>
                </section>

                <section class="step-panel" data-step-panel="skinTone">
                    <h1>Choose Colors</h1>
                    <p class="helper-text">Pick a Being palette</p>
                    <div class="swatch-grid">
                        <button type="button" class="swatch nutmeg" data-setting-choice="skinTone" data-value="Nutmeg"><span>Nutmeg</span></button>
                        <button type="button" class="swatch peachy" data-setting-choice="skinTone" data-value="Peachy"><span>Peachy</span></button>
                        <button type="button" class="swatch creme" data-setting-choice="skinTone" data-value="Creme"><span>Crème</span></button>
                    </div>
                </section>

                <section class="step-panel" data-step-panel="style">
                    <h1>Make It Yours</h1>
                    <p class="helper-text">Pick a style, then choose its colorway.</p>
                    <div class="customizer-shell">
                        <nav class="picker-categories" aria-label="Style categories">
                            <button type="button" class="picker-category active" data-picker-category="hair">Hair</button>
                            <button type="button" class="picker-category" data-picker-category="eyes">Eyes</button>
                            <button type="button" class="picker-category" data-picker-category="ears">Ears</button>
                            <button type="button" class="picker-category" data-picker-category="fit">Fit</button>
                            <button type="button" class="picker-category" data-picker-category="extra">Extra</button>
                        </nav>
                        <div class="picker-panel">
                            <p class="picker-label" id="pickerLabel">HAIR STYLE</p>
                            <div class="asset-grid" id="assetGrid"></div>
                            <p class="picker-label color-label" id="colorLabel">COLORWAY</p>
                            <div class="color-grid" id="colorGrid"></div>
                        </div>
                    </div>
                </section>

                <footer class="creator-actions">
                    <button class="round-button" id="previousButton" type="button">← Back</button>
                    <button class="round-button" id="randomizeButton" type="button">Randomize</button>
                    <button class="round-button primary" id="nextButton" type="button">Next →</button>
                    <button class="round-button save-button" id="saveButton" type="button">Save</button>
                </footer>
            </section>
        </div>
    </main>
    <script src="avatar-studio.js"></script>
</body>
</html>
