<!DOCTYPE html>
<html>
<head>
    <title>8BitGPU</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>
    <div class="desktop">
    <div class="container">
    <header class="hero">
        <img src="pixilart pixie.png" class="pixie">
    <h1>8BitGPU</h1>

    <p>
        Welcome to MY OS...<br>
    </p>
<div class="nav-buttons">
    <button onclick="window.open('https://forms.gle/18ea3aWxwWu9c1rj9', '_blank')">
        <img src="coaching.png" class="desktop-icon">
        <span>1:1 Coaching</span>
</button>

<button onclick="window.open('https://forms.gle/uD31jM6uUzGe3tUa7', '_blank')">
     <img src="mealplan.png" class="desktop-icon">
        <span>Meal Planning</span>
</button>

<button onclick="window.open('https://www.twitch.tv/8bit_pixiee', '_blank')">
     <img src="twitch.png" class="desktop-icon">
        <span>Watch Us Live</span>
</button>

<button onclick="window.open('https://discord.gg/RbqP4BAmH', '_blank')">
     <img src="discord.png" class="desktop-icon">
        <span>Join the Community</span>
</button>
    
<button onclick="window.open('storefront.html','storewindow','width=1100,height=900,left=200,top=100')">
    <img src="moneystack.png" class="desktop-icon">
    <span>Storefront</span>
</button>

    <button onclick="window.open('nick.html','nickwindow','width=700, height=700, right=500, top=150')">
     <img src="disc.png" class="desktop-icon">
        <span>IMPOTRANT</span>
</button>
     <button onclick="window.open('sonic.html','sonicwindow','width=700, height=700, right=500, top=150')">
     <img src="sega.png" class="desktop-icon">
        <span>Sonic.exe</span>
</button>
    <button onclick="sayHi()">
        Test JavaScript
    </button>
    
</div>      <!-- nav-buttons -->
</header>   <!-- hero -->
</div>      <!-- container -->
</div> <!-- desktop -->
<div id="companion" onclick="toggleMenu()">
    <img
        src="body_base_fem_idle_front_v1.png"
        id="bodyLayer"
        class="avatar-layer"
        >
    <img
        src="drawls_fem_idle_front_v1.png"
        id="drawlsLayer"
        class="avatar-layer"
        >
    <img
        src="volume_hair_fem_idle_front_v1.png"
        id="hairLayer"
        class="avatar-layer"
        >
</div>
<div id="avatarMenu" style="display:none;">
    <button onclick="setHair('none')">
        Bald
    </button>

    <button onclick="setHair('volume_hair_fem_idle_front_v1.png')">
        Bombshell
    </button>
</div>
<script src="script.js"></script>
</body>
</html>
