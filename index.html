<!DOCTYPE html>
<html>
<head>
    <title>8BitGPU</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>
    <div class="desktop">
    <img class="desktop-vine vine-left" src="1longleft.png" alt="">
    <img class="desktop-vine vine-right" src="1longright.png" alt="">
    <img class="desktop-vine vine-top" src="clustervines.png" alt="">
    <div class="container">
    <header class="hero">
        <img src="pixilart pixie.png" class="pixie">
    <h1>8BitGPU</h1>

    <p>
        Welcome to MY OS...<br>
    </p>
        
<div class="nav-buttons">
    <button onclick="openApp('coaching')">
        <img src="coaching.png" class="desktop-icon">
        <span>1:1 Coaching</span>
</button>

<button onclick="openApp('mealPlanning')">
     <img src="mealplan.png" class="desktop-icon">
        <span>Meal Planning</span>
</button>

<button onclick="openApp('twitch')">
     <img src="twitch.png" class="desktop-icon">
        <span>Watch Us Live</span>
</button>

<button onclick="openApp('discord')">
     <img src="discord.png" class="desktop-icon">
        <span>Join the Community</span>
</button>
    
<button onclick="openApp('storefront')">
    <img src="moneystack.png" class="desktop-icon">
    <span>Storefront</span>
</button>

    <button onclick="openApp('important')">
     <img src="disc.png" class="desktop-icon">
        <span>IMPOTRANT</span>
</button>
     <button onclick="openApp('sonic')">
     <img src="sega.png" class="desktop-icon">
        <span>Sonic.exe</span>
</button>
    
</div>      <!-- nav-buttons -->
</header>   <!-- hero -->
</div>      <!-- container -->
</div> <!-- desktop -->

    <button id="avatarLabButton" onclick="openApp('avatarLab')">
        8BitLab.exe
    </button>

    <button id="loginButton" onclick="openApp('login')">
        Login.exe
    </button>

    <button id="playerBadge" type="button" onclick="openApp('profile')" aria-label="Open player profile">
        <span>PLAYER</span>
        <strong id="playerName">Guest Pixie</strong>
    </button>

    <div id="companion">
    <img id="extraLayer" class="avatar-layer">
    <img
        src="body_base_fem_idle_front_v1.png"
        id="bodyLayer"
        class="avatar-layer"
        >
    <img
        id="earsLayer"
        class="avatar-layer"
        >
    <img id="headLayer" class="avatar-layer">
    <img id="eyesLayer" class="avatar-layer">
    <img
        src="volume_hair_fem_idle_front_v1.png"
        id="hairLayer"
        class="avatar-layer"
        >
    <img id="fitLayer" class="avatar-layer">
    </div>

    <div id="osWindowLayer" aria-live="polite"></div>

    <nav id="osTaskbar" aria-label="8BitGPU taskbar">
        <button id="osStartButton" type="button" onclick="openApp('welcome')"><span class="start-pixel" aria-hidden="true">✦</span> START</button>
        <div id="osTaskTabs"></div>
        <div id="osSystemTray">
            <span class="tray-sparkle" aria-hidden="true">✦</span>
            <span id="osClock" aria-label="Current local time"></span>
            <button id="osTray" type="button" onclick="cycleAngelTime()" aria-label="Change angel time message"></button>
        </div>
    </nav>
<script src="script.js"></script>

</body>
</html>
