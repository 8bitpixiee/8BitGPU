<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>8BitGPU</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>
    <div class="desktop">
    <img class="desktop-vine vine-left" src="1longleft.png" alt="">
    <img class="desktop-vine vine-right" src="1longright.png" alt="">
    <img class="desktop-vine vine-top" src="clustervines.png" alt="">
    <div class="container">
    <header class="hero">
        <img src="pixilart pixie.png" class="pixie">
    <h1>8BitGPU</h1>

    <p>
        Welcome to MY OS...<br>
    </p>
        
<div class="nav-buttons">
    <button onclick="openApp('coaching')">
        <img src="coaching.png" class="desktop-icon">
        <span>1:1 Coaching</span>
</button>

<button onclick="openApp('mealPlanning')">
     <img src="mealplan.png" class="desktop-icon">
        <span>Meal Planning</span>
</button>

<button onclick="openApp('twitch')">
     <img src="twitch.png" class="desktop-icon">
        <span>Watch Us Live</span>
</button>

<button onclick="openApp('discord')">
     <img src="discord.png" class="desktop-icon">
        <span>Join the Community</span>
</button>
    
<button onclick="openApp('storefront')">
    <img src="moneystack.png" class="desktop-icon">
    <span>Storefront</span>
</button>

    <button onclick="openApp('important')">
     <img src="disc.png" class="desktop-icon">
        <span>IMPOTRANT</span>
</button>
     <button onclick="openApp('sonic')">
     <img src="sega.png" class="desktop-icon">
        <span>Sonic.exe</span>
</button>
    
</div>      <!-- nav-buttons -->
</header>   <!-- hero -->
</div>      <!-- container -->
</div> <!-- desktop -->

    <button id="playerBadge" type="button" onclick="openApp('profile')" aria-label="Open player profile">
        <span>PLAYER</span>
        <strong id="playerName">Guest Pixie</strong>
    </button>

    <section id="beingDock" aria-label="Your Being">
        <p class="being-dock-label">YOUR BEING</p>
        <div class="being-frame">
            <div id="companion">
                <img id="extraLayer" class="avatar-layer">
                <img src="body_base_fem_idle_front_v1.png" id="bodyLayer" class="avatar-layer">
                <img id="earsLayer" class="avatar-layer">
                <img id="headLayer" class="avatar-layer">
                <img id="eyesLayer" class="avatar-layer">
                <img src="volume_hair_fem_idle_front_v1.png" id="hairLayer" class="avatar-layer">
                <img id="fitLayer" class="avatar-layer">
            </div>
            <p id="beingEmptyState">MAKE A BEING<br>IN AVATAR LAB</p>
        </div>
        <div class="being-actions" aria-label="Being actions">
            <button type="button" onclick="playBeingAction('wave')">WAVE</button>
            <button type="button" onclick="playBeingAction('dance')">DANCE</button>
            <button type="button" onclick="playBeingAction('spin')">SPIN</button>
        </div>
    </section>

    <aside id="beingHud" aria-label="Being stats">
        <div class="mana-jar" title="Mana: 80 out of 100" aria-label="Mana 80 out of 100">
            <span class="jar-lid"></span>
            <span class="jar-glow"></span>
            <span class="jar-sparkle">✦</span>
        </div>
        <div class="hud-stats">
            <p><span>LVL</span> <strong id="beingLevel">01</strong></p>
            <div class="xp-label"><span>XP</span><strong id="beingXp">120 / 300</strong></div>
            <div class="xp-track" aria-label="120 of 300 experience"><span id="xpFill"></span></div>
            <div class="mana-label"><span>MANA</span><strong id="manaValue">80 / 100</strong></div>
        </div>
    </aside>

    <section id="osStartMenu" aria-label="Start menu" aria-hidden="true">
        <button class="start-user-card" type="button" onclick="openApp('profile')">
            <span class="start-user-icon">✦</span>
            <span><small>PLAYER</small><strong id="startMenuName">Guest Pixie</strong></span>
        </button>
        <div class="start-menu-divider"></div>
        <button type="button" onclick="openApp('avatarLab')">✦ Avatar Lab.exe</button>
        <button type="button" onclick="openApp('login')">✦ Login.exe</button>
        <button type="button" onclick="openApp('storefront')">✦ Storefront.exe</button>
        <button type="button" onclick="openApp('twitch')">✦ Watch Us Live</button>
    </section>

    <div id="osWindowLayer" aria-live="polite"></div>

    <nav id="osTaskbar" aria-label="8BitGPU taskbar">
        <button id="osStartButton" type="button" onclick="toggleStartMenu()"><span class="start-pixel" aria-hidden="true"><img src="pixilart pixie.png" alt=""></span> START</button>
        <div id="osTaskTabs"></div>
        <div id="osSystemTray">
            <div class="taskbar-socials" aria-label="Social links">
                <button class="taskbar-social" type="button" onclick="openApp('twitch')" aria-label="Open Twitch"><img src="twitch.png" alt=""></button>
                <button class="taskbar-social" type="button" onclick="openApp('discord')" aria-label="Open Discord"><img src="discord.png" alt=""></button>
                <span class="taskbar-social taskbar-instagram-slot" title="Instagram icon coming soon">IG</span>
            </div>
            <span class="tray-sparkle" aria-hidden="true">8</span>
            <span id="osClock" aria-label="Current local time"></span>
            <button id="osTray" type="button" onclick="cycleAngelTime()" aria-label="Change angel time message"></button>
        </div>
    </nav>
<script src="script.js"></script>

</body>
</html>
